<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>2024 love</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f0f0;
    font-family: Arial, sans-serif;
  }
  canvas {
    position: relative;
  }
  #loveMessage {
    position: absolute;
    top: 20%;
    width: 300px;
    text-align: center;
    font-size: 20px;
    color: #ff1493;
    animation: fadeInOut 5s ease-in-out infinite;
  }
  @keyframes fadeInOut {
    0%,100% { opacity: 0; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="loveMessage">詠萱2024依然愛妳</div>
<canvas id="heartCanvas" width="300" height="300"></canvas>
<script src="script.js"></script>
</body>
</html>
