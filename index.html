<!DOCTYPE html>
<html>
<head>
    <title></title>
    <meta charset="utf-8" />
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }
        svg {
            height: 100px;
            width: 100%; /* Make SVG responsive */
        }
    </style>
</head>

<body>
    <!-- print a colorful words in a line "Venessa 2024 還是愛妳唷" -->
    <!-- Gradient Text using SVG -->
    <svg id="gradient-text" viewBox="0 0 600 100" preserveAspectRatio="xMidYMid meet">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#84fab0;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#8fd3f4;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#a18cd1;stop-opacity:1" />
            </linearGradient>
        </defs>
        <text x="50%" y="50%" dy=".3em" text-anchor="middle" fill="url(#gradient)" font-family="Arial" font-size="24">
            Vanessa 2024 還是愛妳唷
        </text>
    </svg>
</br>
    <canvas id="canvas" width="525" height="525"></canvas>
</body>
</html>
